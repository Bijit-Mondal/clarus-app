info:
  name: Create Tenant Scoped Todo
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/v1/todos
  headers:
    - name: Cookie
      value: cookies.txt
    - name: Content-Type
      value: application/json
    - name: X-Tenant-Id
      value: 6a4d2f254b0c3c9d9a3f
  body:
    type: json
    data: |-
      {
        "title" :"Hello, Moon"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
