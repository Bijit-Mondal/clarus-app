info:
  name: Register
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:8080/v1/account
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      // {
      //   "email": "bijitju@bijit.xyz",
      //   "password": "bijitju@bijit.xyz",
      //   "name": "Bijit Mondal"
      //   }
      {
        "email": "hello@bijit.xyz",
        "password": "hello@bijit.xyz",
        "name": "Bijit Mondal"
        }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
